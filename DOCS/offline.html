<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>MySafeOps — Offline</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',system-ui,sans-serif;background:#0f172a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
    .wrap{text-align:center;max-width:360px}
    .shield{width:72px;height:72px;background:#0d9488;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem}
    h1{font-size:22px;font-weight:500;margin-bottom:8px}
    p{font-size:14px;color:#94a3b8;line-height:1.6;margin-bottom:1.5rem}
    .note{font-size:13px;color:#64748b;background:#1e293b;border-radius:8px;padding:12px 14px;margin-bottom:1.5rem;text-align:left}
    .note strong{color:#94a3b8}
    button{padding:10px 24px;border-radius:8px;border:none;background:#0d9488;color:#fff;font-size:14px;cursor:pointer;font-family:inherit}
    button:hover{background:#0f6e56}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="shield">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#E1F5EE" stroke-width="1.5" stroke-linecap="round">
        <path d="M12 2L3 7v9c0 4 3 6 9 7 6-1 9-3 9-7V7L12 2z"/>
        <path d="M9 12l2 2 4-4"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>No internet connection detected. MySafeOps works offline — your data is saved locally on this device.</p>
    <div class="note">
      <strong>What you can still do:</strong><br/>
      All previously loaded data is available. New entries will be saved locally and remain intact when you reconnect.
    </div>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
