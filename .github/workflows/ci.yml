name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium
      - name: E2E marketing (blog + landing)
        run: npm run test:e2e:blog && npm run test:e2e:landing
      - name: Production build
        run: npm run build
