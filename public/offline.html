<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d9488" />
    <title>MySafeOps — Offline</title>
    <style>
      body {
        font-family: "DM Sans", system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background: #f8fafc;
        color: #0f172a;
        text-align: center;
        box-sizing: border-box;
      }
      .card {
        max-width: 360px;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 1.5rem;
      }
      h1 {
        font-size: 1.125rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
        color: #0d9488;
      }
      p {
        font-size: 0.875rem;
        line-height: 1.5;
        color: #64748b;
        margin: 0 0 1rem;
      }
      button {
        font-family: inherit;
        font-size: 0.875rem;
        font-weight: 500;
        padding: 0.625rem 1rem;
        border-radius: 6px;
        border: 1px solid #085041;
        background: #0d9488;
        color: #e1f5ee;
        cursor: pointer;
      }
      button:active {
        opacity: 0.92;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>MySafeOps could not load the app shell. Check your connection, then try again. Data saved in this browser is still on your device.</p>
      <button type="button" onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
